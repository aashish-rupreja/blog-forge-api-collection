info:
  name: Get All Author Applications
  type: http
  seq: 1

http:
  method: GET
  url: "{{blogForge}}/api/v1/author-applications?applicationReviewerUsername=ami"
  params:
    - name: applicationReviewerUsername
      value: ami
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
