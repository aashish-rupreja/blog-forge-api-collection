info:
  name: Change Password
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{blogForge}}/api/v1/users/me/password"
  body:
    type: json
    data: |-
      {
        "oldPassword":"Secure@123",
        "newPassword":"Abcd#1234",
        "confirmNewPassword":"Abcd#1234"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
